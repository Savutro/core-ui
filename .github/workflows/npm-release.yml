name: NPM Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@savutro'
          cache: npm
      - run: npm ci
      - run: npm run build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@savutro'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm publish
      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## " version || $0 ~ "^## " version " - " { printing=1; next }
            printing && /^## / { exit }
            printing { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then cp CHANGELOG.md release-notes.md; fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
